[vendor]
name = First Layer Flow
config_version = 1.0.0
repo_id = non-prusa-fff

[printer_model:FLF_SINGLE]
name = First Layer Flow Extension
technology = FFF
family = First Layer Flow
variants = default
default_materials = First Layer Flow PLA

[printer:*first_layer_flow_common*]
printer_model = FLF_SINGLE
gcode_flavor = marlin2
bed_shape = 0x0,250x0,250x210,0x210
max_print_height = 210
printer_notes = PRINTER_VENDOR_FIRST_LAYER_FLOW\nPRINTER_MODEL_FLF_SINGLE
start_gcode = {if !is_nil(custom_parameter_filament_first_layer_extrusion_multiplier[initial_extruder])}\n; FIRST_LAYER_FLOW_APPLY\nM221 S{int(100 * custom_parameter_filament_first_layer_extrusion_multiplier[initial_extruder])}\n{else}\n; FIRST_LAYER_FLOW_APPLY\nM221 S{int(100 * extrusion_multiplier[initial_extruder])}\n{endif}
before_layer_gcode = {if layer_num == 1}\n; FIRST_LAYER_FLOW_RESET\nM221 S{int(100 * extrusion_multiplier[current_extruder])}\n{endif}
end_gcode = M104 S0\nM140 S0\nM84

[printer:First Layer Flow Single Extruder]
inherits = *first_layer_flow_common*
printer_variant = default
default_print_profile = First Layer Flow 0.20mm
default_filament_profile = First Layer Flow PLA

[print:*first_layer_flow_common*]
compatible_printers_condition = printer_notes=~/.*PRINTER_VENDOR_FIRST_LAYER_FLOW.*/ and printer_notes=~/.*PRINTER_MODEL_FLF_SINGLE.*/
layer_height = 0.2
first_layer_height = 0.2
perimeters = 2
fill_density = 15%
infill_pattern = gyroid

[print:First Layer Flow 0.20mm]
inherits = *first_layer_flow_common*

[filament:*first_layer_flow_common*]
compatible_printers_condition = printer_notes=~/.*PRINTER_VENDOR_FIRST_LAYER_FLOW.*/ and printer_notes=~/.*PRINTER_MODEL_FLF_SINGLE.*/
filament_diameter = 1.75
extrusion_multiplier = 1
temperature = 215
first_layer_temperature = 215
bed_temperature = 60
first_layer_bed_temperature = 60
fan_always_on = 1

[filament:First Layer Flow PLA]
inherits = *first_layer_flow_common*
custom_parameters_filament = {"first_layer_extrusion_multiplier": 1.02}
